# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "sigma-racer-wingman"
BBFILE_PATTERN_sigma-racer-wingman = "^${LAYERDIR}/"
BBFILE_PRIORITY_sigma-racer-wingman = "20"

LAYERDEPENDS_sigma-racer-wingman = "core openembedded-layer"
# meta-imx, meta-freescale, meta-rust, meta-rauc added via bblayers.conf.sample
LAYERSERIES_COMPAT_sigma-racer-wingman = "scarthgap"

# Instrumentation UI — sibling repos under embedded/
SIGMA_RACER_WINGMAN_ROOT ??= "${LAYERDIR}/../.."
SIGMA_INSTRUMENTATION_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-instrumentation"
SIGMA_RACER_CLUSTER_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-cluster"
SIGMA_RACER_VEHICLE_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-vehicle"
SIGMA_RACER_TELEMETRY_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-telemetry"
SIGMA_RACER_SIDEARM_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-sidearm"

LICENSE_PATH += "${LAYERDIR}/licenses"
