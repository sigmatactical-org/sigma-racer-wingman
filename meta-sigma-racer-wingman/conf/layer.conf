# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# Our pinned Rust/Cargo 1.90.0 recipes (recipes-devtools/{rust,cargo}/) carry
# only the version-specific bits (rust-source/-snapshot .inc) and `require` the
# shared, version-agnostic includes that ship in the vendored meta-rust layer
# (rust-target.inc, cargo.inc, rust-cross.inc, rust-llvm.inc, ...). meta-rust
# only puts its layer root on BBPATH, so add its recipe dirs here to resolve
# those bare requires without editing the vendored layer.
BBPATH .= ":${LAYERDIR}/../../meta-rust/recipes-devtools/rust"
BBPATH .= ":${LAYERDIR}/../../meta-rust/recipes-devtools/cargo"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

# i.MX-BSP-only content (e.g. the qemu 8.2.2.imx sched_attr patch). Parsed only
# when the meta-imx BSP layer (fsl-bsp-release) is in the build, so the QEMU-virt
# target — which has no .imx recipes — doesn't choke on orphaned bbappends.
BBFILES_DYNAMIC += " \
    fsl-bsp-release:${LAYERDIR}/dynamic-layers/fsl-bsp-release/recipes-*/*/*.bb \
    fsl-bsp-release:${LAYERDIR}/dynamic-layers/fsl-bsp-release/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "sigma-racer-wingman"
BBFILE_PATTERN_sigma-racer-wingman = "^${LAYERDIR}/"
BBFILE_PRIORITY_sigma-racer-wingman = "20"

LAYERDEPENDS_sigma-racer-wingman = "core openembedded-layer"
# meta-imx, meta-freescale, meta-rust, meta-rauc added via bblayers.conf.sample
LAYERSERIES_COMPAT_sigma-racer-wingman = "scarthgap"

# Instrumentation UI — sibling repos under embedded/
SIGMA_RACER_WINGMAN_ROOT ??= "${LAYERDIR}/../.."
SIGMA_INSTRUMENTATION_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-instrumentation"
SIGMA_RACER_CLUSTER_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-cluster"
SIGMA_RACER_VEHICLE_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-vehicle"
SIGMA_RACER_TELEMETRY_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-telemetry"
SIGMA_RACER_SIDEARM_SRC ??= "${SIGMA_RACER_WINGMAN_ROOT}/sigma-racer-sidearm"

LICENSE_PATH += "${LAYERDIR}/licenses"
