<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  The instrument cluster UI (cluster-ui.service) runs as user "cluster"
  and manages Wi-Fi through connman. connman's stock policy only admits
  root and at_console, so every call from the cluster was AccessDenied.
  BlueZ needs no equivalent: its stock policy already allows all users.
-->
<busconfig>
  <policy user="cluster">
    <allow send_destination="net.connman"/>
  </policy>
</busconfig>
