[system]
# @MACHINE@ is substituted with the actual MACHINE at build time by the recipe.
# RAUC does not expand variables at runtime, so this must be a literal string
# that matches the `compatible` set on the update bundle.
compatible=@MACHINE@
bootloader=uboot
mountprefix=/run/rauc
data-directory=/data/rauc

[keyring]
path=/etc/rauc/ca.cert.pem
use-bundle-signing-time=true

[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootfs_a
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootfs_b
type=ext4
bootname=B

[slot.boot.0]
device=/dev/disk/by-partlabel/boot
type=raw
