require conf/distro/poky.conf
require conf/distro/include/co-pilot-wayland.inc
require conf/distro/include/co-pilot-security.inc

DISTRO = "co-pilot"
DISTRO_NAME = "Sigma Co-Pilot Instrument Cluster"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "cluster"

MAINTAINER = "Sigma Embedded <embedded@sigma.local>"

TARGET_VENDOR = "-sigma"

# systemd everywhere
INIT_MANAGER = "systemd"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
DISTRO_FEATURES:append = " systemd usrmerge"

# Coredump support (coredumpctl ships in the main systemd package)
PACKAGECONFIG:append:pn-systemd = " coredump"

# Graphics & connectivity baseline
DISTRO_FEATURES:append = " wayland opengl egl gles2 vulkan"
DISTRO_FEATURES:append = " bluetooth wifi nfc pam polkit"
DISTRO_FEATURES:append = " can socketcan"
DISTRO_FEATURES:remove = " x11"

# Production-oriented features (enable in local.conf for target images)
# DISTRO_FEATURES:append = " rauc read-only-rootfs tpm2"

# Prefer NXP BSP kernel and GPU stack (hardware targets only)
PREFERRED_PROVIDER_virtual/kernel = "linux-imx"
PREFERRED_PROVIDER_virtual/libgl = "imx-gpu-viv"
PREFERRED_PROVIDER_virtual/egl = "imx-gpu-viv"
PREFERRED_PROVIDER_virtual/libgles2 = "imx-gpu-viv"

# Virtual QEMU target — upstream kernel + Mesa (see machine/co-pilot-qemu.conf)
PREFERRED_PROVIDER_virtual/kernel:virt = "linux-yocto"
PREFERRED_PROVIDER_virtual/libgl:virt = "mesa"
PREFERRED_PROVIDER_virtual/egl:virt = "mesa"
PREFERRED_PROVIDER_virtual/libgles2:virt = "mesa"
PREFERRED_PROVIDER_virtual/libgbm:virt = "mesa"

# Wayland compositor
PREFERRED_PROVIDER_virtual/weston = "weston"

# Rust toolchain (meta-rust) — instrumentation uses edition 2024 (needs 1.85+)
require conf/distro/include/rust_versions.inc
RUST_VERSION = "1.86.0"
# Poky's x86_64 layout is pre-Rust 1.80; rustc 1.86 rejects it when cross-compiling.
DATA_LAYOUT[x86_64] = "e-m:e-p270:32:32-p271:32:32-p272:64:64-i64:64-i128:128-f80:128-n8:16:32:64-S128"

# Image defaults
IMAGE_FSTYPES ?= "wic.gz wic.bmap ext4.gz"
WKS_FILE ?= "co-pilot-ab.wks.in"

# Read-only root with overlay for /etc and /var when enabled
OVERLAYFS_ETC_USE_ORIG_INIT_FILE = "1"

# OTA / RAUC slot naming
RAUC_SLOT_ROOTFS_A = "rootfs_a"
RAUC_SLOT_ROOTFS_B = "rootfs_b"

# Instrument cluster runs as dedicated user
CO_PILOT_USER = "cluster"
CO_PILOT_GROUP = "cluster"

# Sole UI application (instrumentation / sigma-dash)
CO_PILOT_CLUSTER_APP = "sigma-dash"
CO_PILOT_UI_PACKAGE = "instrumentation"

INHERIT += "uninative"
