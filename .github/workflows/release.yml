name: Release

on:
  push:
    tags:
      - "wingman-*"
  workflow_dispatch:
    inputs:
      image_version:
        description: Image/catalog version (overrides manifest)
        required: false
        type: string
      channel:
        description: OTA channel
        required: false
        default: dev
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, yocto]
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v5
        with:
          path: embedded/sigma-racer-wingman
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        working-directory: embedded/sigma-racer-wingman
        run: |
          if [[ -n "${{ inputs.image_version }}" ]]; then
            ver="${{ inputs.image_version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#wingman-}"
          else
            ver="$(python3 -c 'import json; print(json.load(open("release-manifest.json"))["image_version"])')"
          fi
          channel="${{ inputs.channel || 'dev' }}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Materialize sibling repos from manifest
        env:
          EMBEDDED_ROOT: ${{ github.workspace }}/embedded
        run: |
          chmod +x embedded/sigma-racer-wingman/scripts/ci/*.sh
          embedded/sigma-racer-wingman/scripts/ci/prepare-workspace.sh

      - name: Build production image
        env:
          EMBEDDED_ROOT: ${{ github.workspace }}/embedded
          RAUC_KEY_FILE: ${{ secrets.RAUC_KEY_FILE }}
          RAUC_CERT_FILE: ${{ secrets.RAUC_CERT_FILE }}
          SIGMA_RELEASE_NOTES: "Wingman ${{ steps.meta.outputs.version }}"
          SIGMA_UPDATES_CHANNEL: ${{ steps.meta.outputs.channel }}
          SIGMA_UPDATES_BASE_URL: ${{ vars.SIGMA_UPDATES_BASE_URL }}
        run: embedded/sigma-racer-wingman/scripts/ci/bitbake-release.sh

      - name: Checkout updates (CLI)
        uses: actions/checkout@v5
        with:
          repository: sigmatactical-org/updates
          path: it/updates
          fetch-depth: 1

      - name: Publish product packages
        env:
          UPDATES_SRC: ${{ github.workspace }}/it/updates
          # Kind/localdev: HTTP updates + shared token (avoids rustls/mkcert UnknownIssuer).
          # Production: set SIGMA_UPDATES_PUBLISH_URL to Identity …/api and use OIDC secrets instead.
          SIGMA_UPDATES_URL: ${{ vars.SIGMA_UPDATES_PUBLISH_URL }}
          SIGMA_INTERNAL_TOKEN: ${{ secrets.SIGMA_INTERNAL_TOKEN }}
        run: |
          chmod +x embedded/sigma-racer-wingman/scripts/ci/publish-product-debs.sh
          embedded/sigma-racer-wingman/scripts/ci/publish-product-debs.sh

      - name: Publish update bundle
        env:
          SIGMA_UPDATES_URL: ${{ vars.SIGMA_UPDATES_PUBLISH_URL }}
          SIGMA_INTERNAL_TOKEN: ${{ secrets.SIGMA_INTERNAL_TOKEN }}
          SIGMA_UPDATES_CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          chmod +x embedded/sigma-racer-wingman/scripts/ci/publish-bundle.sh
          embedded/sigma-racer-wingman/scripts/ci/publish-bundle.sh \
            embedded/sigma-racer-wingman/dist/release/sigma-racer-wingman-imx8mp

      - name: Publish to object store
        if: vars.SIGMA_PUBLISH_ARTIFACTS == 'true'
        env:
          SIGMA_ARTIFACT_ENDPOINT: ${{ secrets.SIGMA_ARTIFACT_ENDPOINT }}
          SIGMA_ARTIFACT_ACCESS_KEY: ${{ secrets.SIGMA_ARTIFACT_ACCESS_KEY }}
          SIGMA_ARTIFACT_SECRET_KEY: ${{ secrets.SIGMA_ARTIFACT_SECRET_KEY }}
          SIGMA_ARTIFACT_BUCKET: ${{ vars.SIGMA_ARTIFACT_BUCKET }}
          SIGMA_ARTIFACT_REGION: ${{ vars.SIGMA_ARTIFACT_REGION }}
          SIGMA_UPDATES_CHANNEL: ${{ steps.meta.outputs.channel }}
          SIGMA_UPDATES_BASE_URL: ${{ vars.SIGMA_UPDATES_BASE_URL }}
        run: |
          embedded/sigma-racer-wingman/scripts/ci/publish-artifacts.sh \
            embedded/sigma-racer-wingman/dist/release/sigma-racer-wingman-imx8mp

      - name: Create GitHub release (metadata only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Wingman ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          body: |
            OTA channel: `${{ steps.meta.outputs.channel }}`
            Image version: `${{ steps.meta.outputs.version }}`

            Product `.deb` packages are published via `sigma-updates-cli` (OIDC → kind Identity).
            Image blobs are published to object storage when `SIGMA_PUBLISH_ARTIFACTS=true`.
            See `docs/CI.md` for catalog URLs and RAUC install steps.
          files: |
            embedded/sigma-racer-wingman/dist/release/sigma-racer-wingman-imx8mp/catalog-latest.json
